name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ai-decision-machine
  REGION: us-central1
  SERVICE_NAME: ai-decision-engine
  NEXT_PUBLIC_SUPABASE_URL: https://ecvstrjfrjypiyiccwmi.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnN0cmpmcmp5cGl5aWNjd21pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MDQyMjMsImV4cCI6MjA5MTk4MDIyM30.HYvcFPEyW7mNsTtJFg_ISmPIcaqrlW5sURpgTYR_PJc

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source . \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --min-instances 1 \
            --cpu-boost \
            --set-build-vars="NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }},NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --set-env-vars="RUNWAY_GUARDIAN_URL=https://nexus-runway-guardian-967036044210.us-central1.run.app" \
            --set-env-vars="GCP_PROJECT_ID=ai-decision-machine" \
            --set-env-vars="GCP_LOCATION=us-central1" \
            --set-env-vars="GROQ_API_KEY=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" \
            --set-env-vars="NEXT_PUBLIC_SUPABASE_URL=https://ecvstrjfrjypiyiccwmi.supabase.co" \
            --set-env-vars="NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnN0cmpmcmp5cGl5aWNjd21pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MDQyMjMsImV4cCI6MjA5MTk4MDIyM30.HYvcFPEyW7mNsTtJFg_ISmPIcaqrlW5sURpgTYR_PJc" \
